{% extends "base.html" %}
{% block title %}登录 — 中文 DOS 游戏{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">登录</h1>
        <p class="auth-subtitle">登录以同步游戏存档</p>

        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input"
                       placeholder="输入用户名" required minlength="2" maxlength="30" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input"
                       placeholder="输入密码" required minlength="4" autocomplete="current-password">
            </div>
            <div class="form-error" id="form-error" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-block" id="submit-btn">登录</button>
        </form>

        <p class="auth-switch">
            还没有账号？ <a href="/register">立即注册 →</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
