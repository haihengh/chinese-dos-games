{% extends "base.html" %}
{% block title %}注册 — 中文 DOS 游戏{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">注册</h1>
        <p class="auth-subtitle">创建账号以保存游戏进度</p>

        <form id="register-form" class="auth-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input"
                       placeholder="2-30 个字符" required minlength="2" maxlength="30" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input"
                       placeholder="至少 4 个字符" required minlength="4" autocomplete="new-password">
            </div>
            <div class="form-error" id="form-error" style="display:none;"></div>
            <button type="submit" class="btn btn-primary btn-block" id="submit-btn">注册</button>
        </form>

        <p class="auth-switch">
            已有账号？ <a href="/login">立即登录 →</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
{% endblock %}
