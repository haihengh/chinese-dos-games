# ─── Chinese DOS Games + Local AI (Ollama + Qwen3-VL 4B) ───
#   docker compose -f docker-compose.local-ai.yml up -d
#   → No API key needed — AI runs entirely on your machine
#
# Requirements:
#   - 8GB+ RAM (16GB recommended)
#   - ~4GB disk for the Qwen3-VL model (downloaded on first start)
#   - Qwen3-VL is vision-capable — better screenshot analysis than Gemma
#
# GPU acceleration (optional — CPU-only works fine):
#   NVIDIA:  -f docker-compose.local-ai.gpu-nvidia.yml
#   AMD/Arc: -f docker-compose.local-ai.gpu-amd.yml
#   Mac:     Docker has no GPU passthrough; run `brew install ollama` natively
#
#   Example (NVIDIA):
#     docker compose -f docker-compose.local-ai.yml \
#                    -f docker-compose.local-ai.gpu-nvidia.yml up -d

services:
  # ── Ollama: local LLM inference engine ──
  ollama:
    image: ollama/ollama:latest
    container_name: dos-games-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"  # Expose for debugging; internal network also works
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    # GPU: add an override file — see docker-compose.local-ai.gpu-*.yml
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Model puller: ensures Qwen3-VL is downloaded at startup ──
  ollama-pull:
    image: ollama/ollama:latest
    container_name: dos-games-ollama-pull
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for ollama..."
        sleep 5
        echo "Pulling qwen3-vl:4b model (~4GB, one-time)..."
        ollama pull qwen3-vl:4b
        echo "Model ready!"
    environment:
      - OLLAMA_HOST=ollama:11434
    volumes:
      - ollama-models:/root/.ollama
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "1"

  # ── Chinese DOS Games Web ──
  # Pre-built image from Docker Hub. `build: .` enables local rebuilds:
  #   docker compose -f docker-compose.local-ai.yml build
  dos-games:
    build: .
    image: haihengh/chinese-dos-games:latest
    container_name: dos-games
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - dos-games-bin:/app/bin
      - dos-games-img:/app/img
      - dos-games-cache:/app/web/jsdos_cache
      - dos-games-data:/app/web/data
    environment:
      # ── Local AI (auto-detected, no API key needed) ──
      - OLLAMA_BASE_URL=http://ollama:11434
      - LOCAL_AI_MODEL=${LOCAL_AI_MODEL:-qwen3-vl:4b}
      - LOCAL_AI_DEFAULT=${LOCAL_AI_DEFAULT:-true}

      # ── Cloud AI fallback (optional) ──
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}

      # ── Game download mirror ──
      - GAME_DOWNLOAD_BASE=${GAME_DOWNLOAD_BASE:-}

      # ── Auth (omit to auto-generate random keys on first run) ──
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}

    depends_on:
      - ollama
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama-models:
  dos-games-bin:
  dos-games-img:
  dos-games-cache:
  dos-games-data:
